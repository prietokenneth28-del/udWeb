<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Iniciar Sesión - Kenneth Prieto</title>

    <!-- Hojas de estilo -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/services/css/planEstudios.css">

    <style>
        /* Estilos específicos para centrar el login en la pantalla */
        .login-wrapper {
            min-height: calc(100vh - 56px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            border-radius: 1rem;
            background-color: var(--bs-tertiary-bg);
        }
        .login-icon {
            font-size: 4.5rem;
            color: #0d6efd;
            line-height: 1;
        }
        .form-floating > label {
            color: #adb5bd;
        }
    </style>
</head>
<body>
    <div id="header-container"></div>

    <div class="container-fluid login-wrapper">

        <!-- Tarjeta de Login -->
        <div class="card login-card shadow-lg border-secondary">
            <div class="card-body p-4 p-sm-5 text-center">

                <!-- Icono de usuario -->
                <i class="bi bi-person-circle login-icon mb-3 d-inline-block"></i>
                <h3 class="mb-4 fw-bold">Bienvenido de nuevo</h3>

                <!-- Formulario -->
                <form id="login-form">

                    <!-- Campo Usuario -->
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="login-username" placeholder="Usuario" required>
                        <label for="login-username">Usuario</label>
                    </div>

                    <!-- Campo Contraseña -->
                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="login-password" placeholder="Contraseña" required>
                        <label for="login-password">Contraseña</label>
                    </div>

                    <p id="login-status" class="small mb-3"></p>

                    <!-- Botón de Envío -->
                    <button class="btn btn-primary w-100 py-2 fs-5 fw-semibold" type="submit" id="login-submit">
                        Entrar <i class="bi bi-box-arrow-in-right ms-1"></i>
                    </button>
                </form>

                <a href="/pages/plan-estudios.html" class="d-inline-block mt-4 small text-body-secondary">
                    Ver el plan sin iniciar sesión
                </a>
            </div>
        </div>
    </div>

    <div id="footer-container"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/api/api.js"></script>
    <script src="/services/js/components.js"></script>
    <script>
        // Si ya hay una sesión activa (token en sessionStorage), no tiene
        // sentido quedarse en el login: se va directo al plan.
        if (isLoggedIn()) {
            window.location.href = "/pages/plan-estudios.html";
        }

        document.getElementById("login-form").addEventListener("submit", async (event) => {
            event.preventDefault();

            const username = document.getElementById("login-username").value;
            const password = document.getElementById("login-password").value;
            const status = document.getElementById("login-status");
            const submitBtn = document.getElementById("login-submit");

            submitBtn.disabled = true;
            try {
                await login(username, password);
                status.textContent = "Sesión iniciada ✔ Redirigiendo…";
                status.className = "small mb-3 text-success";
                window.location.href = "/pages/plan-estudios.html";
            } catch (err) {
                status.textContent = err.message;
                status.className = "small mb-3 text-danger";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
