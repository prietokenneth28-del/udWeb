<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Iniciar Sesión - Kenneth Prieto</title>
    
    <!-- Hojas de estilo -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../services/css/planEstudios.css">
    
    <style>
        /* Estilos específicos para centrar el login en la pantalla */
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            border-radius: 1rem;
            background-color: var(--bs-tertiary-bg); /* Mismo fondo de tus tarjetas de dashboard */
        }
        .login-icon {
            font-size: 4.5rem;
            color: #0d6efd; /* Azul primario de Bootstrap */
            line-height: 1;
        }
        /* Ajuste para que los floating labels se vean bien en tema oscuro */
        .form-floating > label {
            color: #adb5bd; 
        }
    </style>
</head>
<body>
    <div class="container-fluid login-wrapper">
        
        <!-- Botón para regresar al inicio -->
        <div class="w-100 mb-3 text-start" style="max-width: 420px;">
            <a href="../index.html" class="btn btn-outline-light btn-sm">
                <i class="bi bi-arrow-left"></i> Volver al inicio
            </a>
        </div>

        <!-- Tarjeta de Login -->
        <div class="card login-card shadow-lg border-secondary">
            <div class="card-body p-4 p-sm-5 text-center">
                
                <!-- Icono de usuario -->
                <i class="bi bi-person-circle login-icon mb-3 d-inline-block"></i>
                <h3 class="mb-4 fw-bold">Bienvenido de nuevo</h3>
                
                <!-- Formulario -->
                <form id="login-form">
                    
                    <!-- Campo Usuario -->
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="loginUsername" placeholder="Usuario" required>
                        <label for="loginUsername">Usuario</label>
                    </div>
                    
                    <!-- Campo Contraseña -->
                    <div class="form-floating mb-4">
                        <input type="password" class="form-control" id="loginPassword" placeholder="Contraseña" required>
                        <label for="loginPassword">Contraseña</label>
                    </div>
                    
                    <!-- Opciones adicionales (Recordarme / Olvidé contraseña) -->
                    <div class="d-flex justify-content-between align-items-center mb-4 small">
                        <div class="form-check text-start">
                            <input class="form-check-input" type="checkbox" value="" id="rememberMe">
                            <label class="form-check-label" for="rememberMe">
                                Recordarme
                            </label>
                        </div>
                        <a href="#" class="text-decoration-none text-info">¿Olvidaste tu clave?</a>
                    </div>
                    
                    <!-- Botón de Envío -->
                    <button class="btn btn-primary w-100 py-2 fs-5 fw-semibold" type="submit">
                        Entrar <i class="bi bi-box-arrow-in-right ms-1"></i>
                    </button>
                    
                </form>
            </div>
        </div>
        
        <!-- Mini Footer -->
        <div class="mt-4 text-center text-body-secondary small">
            &copy; <span id="footer-year"></span> &middot; Kenneth Prieto
        </div>
        
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Actualizar el año automáticamente
        document.getElementById("footer-year").textContent = new Date().getFullYear();
        
        document.getElementById("login-btn").addEventListener("click", async () => {
            const username = document.getElementById("login-username").value;
            const password = document.getElementById("login-password").value;
            const status = document.getElementById("login-status");

            try {
                await login(username, password);
                status.textContent = "Sesión iniciada ✔";
                status.className = "small text-success";
            } catch (err) {
                status.textContent = err.message;
                status.className = "small text-danger";
            }
        });

    </script>
</body>
</html>
