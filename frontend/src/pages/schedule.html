<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mi Horario</title>        
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/services/css/planEstudios.css">

    <style>
        .table-horario th { background-color: #2b3035; vertical-align: middle; }
        .table-horario td { height: 60px; vertical-align: middle; }
        .materia-slot { padding: 5px; border-radius: 5px; font-weight: bold; font-size: 0.9em; }
        /* Ocultar todos los tbody por defecto, excepto el activo */
        tbody.horario-tbody { display: none; }
        tbody.horario-tbody.active { display: table-row-group; }
    </style>
</head>

<body>
    <div id="header-container"></div>

    <div class="container-fluid mt-4">
        <main>
            <div class="card text-center">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h3 class="mb-0">Horario de Clases</h3>
                    
                    <!-- SELECT PARA ELEGIR EL SEMESTRE -->
                    <select id="semestreSelect" class="form-select w-auto" aria-label="Seleccionar Semestre">
                        <!-- Las opciones se generan dinámicamente desde schedule-data.js -->
                    </select>
                </div>
                
                <div class="card-body">
                    
                    <!-- MENSAJE DE HORARIO VACÍO (Oculto por defecto) -->
                    <div id="noScheduleMessage" class="alert alert-warning" style="display: none;" role="alert">
                        No se ha registrado horario para este periodo académico.
                    </div>

                    <!-- SECCIÓN HORARIO DE HOY -->
                    <div class="card bg-dark border-secondary mb-4 text-start">
                        <div class="card-header border-secondary text-info fw-bold" id="tituloHoy">
                            <i class="bi bi-calendar-event"></i> Clases de Hoy
                        </div>
                        <div class="card-body" id="clasesHoyContainer">
                            <!-- El JavaScript inyectará las materias aquí -->
                        </div>
                    </div>

                    <!-- TABLA PRINCIPAL -->
                    <div class="table-responsive" id="scheduleTableContainer">
                        <table class="table table-bordered table-hover table-horario text-center">
                            <thead>
                                <tr>
                                    <th scope="col" style="width: 10%;">Hora</th>
                                    <th scope="col" style="width: 15%;">Lunes</th>
                                    <th scope="col" style="width: 15%;">Martes</th>
                                    <th scope="col" style="width: 15%;">Miércoles</th>
                                    <th scope="col" style="width: 15%;">Jueves</th>
                                    <th scope="col" style="width: 15%;">Viernes</th>
                                    <th scope="col" style="width: 15%;">Sábado</th>
                                </tr>
                            </thead>
                            <!-- Los <tbody> de cada semestre se generan dinámicamente
                                 desde schedule-data.js por main.shedule.js -->
                        </table>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/api/api.js"></script>
    <script src="/services/js/components.js"></script>
    <script src="/services/js/schedule-data.js"></script>
    <script src="/services/js/main.shedule.js"></script>
</body>
</html>
