<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestión de Actividades - Kenneth Prieto</title>
    <!-- Hojas de estilo -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/services/css/planEstudios.css">
</head>
<body>
    <div id="header-container"></div>
    
    <div class="container-fluid mt-4 mb-5">
        <main>
            <div class="row g-4">
                <!-- Formulario de Registro -->
                <div class="col-12 col-lg-4">
                    <div class="card border-info">
                        <div class="card-header bg-info text-dark fw-bold">
                            <i class="bi bi-plus-circle me-2"></i>Nueva Actividad
                        </div>
                        <div class="card-body">
                            <form id="form-actividad">
                                <div class="mb-3">
                                    <label for="act-materia" class="form-label">Materia del periodo actual</label>
                                    <select class="form-select" id="act-materia" required>
                                        <option value="">Selecciona una materia...</option>
                                        <!-- Se llena dinámicamente con JS -->
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label for="act-fecha" class="form-label">Fecha y hora límite (Calendario)</label>
                                    <input type="datetime-local" class="form-control" id="act-fecha" required>
                                </div>
                                <div class="mb-3">
                                    <label for="act-entrega" class="form-label">Modo de entrega</label>
                                    <select class="form-select" id="act-entrega" required>
                                        <option value="">Selecciona un modo...</option>
                                        <option value="Aula Virtual (Moodle)">Aula Virtual (Moodle)</option>
                                        <option value="Correo Electrónico">Correo Electrónico</option>
                                        <option value="Presencial (Físico)">Presencial (Físico)</option>
                                        <option value="Repositorio / Git">Repositorio / Git</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label for="act-link" class="form-label">Link en la nube (Drive, OneDrive, etc.)</label>
                                    <input type="url" class="form-control" id="act-link" placeholder="https://..." required>
                                </div>
                                <div class="mb-3">
                                    <label for="act-desc" class="form-label">Descripción de la actividad</label>
                                    <textarea class="form-control" id="act-desc" rows="3" placeholder="Ej: Resolver taller de elementos finitos..." required></textarea>
                                </div>
                                <div class="alert alert-danger d-none" id="actividad-error"></div>
                                <button type="submit" class="btn btn-info w-100 fw-bold" id="actividad-submit">
                                    <i class="bi bi-calendar-plus me-1"></i> Agregar al Calendario
                                </button>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Lista/Calendario de Actividades -->
                <div class="col-12 col-lg-8">
                    <div class="card bg-transparent border-0">
                        <div class="card-header border-secondary d-flex justify-content-between align-items-center px-0">
                            <h4 class="mb-0"><i class="bi bi-calendar3 me-2"></i>Próximas Entregas</h4>
                        </div>
                        <div class="card-body px-0">
                            <div id="actividades-container" class="row g-3">
                                <!-- Las tarjetas de actividades se inyectarán aquí -->
                            </div>
                            <div id="actividades-vacias" class="alert alert-secondary text-center d-none mt-3">
                                No tienes actividades pendientes. ¡Excelente trabajo!
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="footer-container"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/api/api.js"></script>
    <script src="/services/js/components.js"></script>
    <script src="/services/js/activities.js"></script>
</body>
</html>
