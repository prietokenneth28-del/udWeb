<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Histórico de Notas - Kenneth Prieto</title>
    
    <!-- Hojas de estilo -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/services/css/planEstudios.css">
    
    <style>
        /* Estilos específicos para acercarnos a la imagen referenciada */
        .title-banner {
            background-color: #17a2b8; /* Color cyan/teal similar al de la imagen */
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .nivel-header {
            background-color: #212529 !important; 
            font-weight: bold; 
            font-size: 1.1em;
            border-bottom: 2px solid #17a2b8;
        }
        .table-notas th {
            background-color: #2b3035;
            vertical-align: middle;
            font-size: 0.9em;
        }
        .table-notas td {
            vertical-align: middle;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div id="header-container"></div>

    <div class="container-fluid mt-4">
        <main>
            <div class="card text-center mb-4">
                <div class="card-header title-banner py-2">
                    <h4 class="mb-0">Histórico de Notas</h4>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover table-notas text-center mb-0" id="gradesTable">
                            <tbody id="notas-tbody">
                                <!-- El contenido se generará dinámicamente con JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="footer-container"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/api/api.js"></script>
    <script src="/services/js/components.js"></script>

    <!-- Lógica de Generación de la Tabla -->
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const tableBody = document.getElementById('notas-tbody');

            let ciclos, historial;
            try {
                [ciclos, historial] = await Promise.all([getPlanEstudios(), getHistorial()]);
            } catch (err) {
                tableBody.innerHTML = `<tr><td colspan="8" class="text-danger">Error al conectar con el backend: ${err.message}</td></tr>`;
                return;
            }

            // Une materias con su registro de historial más reciente (si existe)
            const historialPorMateria = new Map();
            historial.forEach((registro) => {
                const actual = historialPorMateria.get(registro.materia_id);
                if (!actual || new Date(registro.fecha_registro) > new Date(actual.fecha_registro)) {
                    historialPorMateria.set(registro.materia_id, registro);
                }
            });

            // 1. Agrupar las materias por nivel (semestre)
            const niveles = {};
            ciclos.forEach((ciclo) => {
                ciclo.semestres.forEach((semestre) => {
                    semestre.materias.forEach((materia) => {
                        if (!niveles[semestre.numero]) niveles[semestre.numero] = [];
                        niveles[semestre.numero].push(materia);
                    });
                });
            });

            // 2. Ordenar los niveles y generar el HTML
            const nivelesOrdenados = Object.keys(niveles).sort((a, b) => Number(a) - Number(b));

            nivelesOrdenados.forEach(nivel => {
                // Generar el encabezado del Nivel
                tableBody.innerHTML += `
                    <tr>
                        <td colspan="8" class="nivel-header text-center py-2">NIVEL: ${nivel}</td>
                    </tr>
                    <tr class="table-secondary">
                        <th style="width: 10%;">Asignatura</th>
                        <th class="text-start" style="width: 30%;">Nombre</th>
                        <th style="width: 10%;">Nota</th>
                        <th style="width: 10%;">Créditos</th>
                        <th style="width: 10%;">Clasificación</th>
                        <th style="width: 10%;">Estado</th>
                        <th style="width: 10%;">Periodo</th>
                        <th style="width: 10%;">Registrado</th>
                    </tr>
                `;

                // Generar las filas de cada materia en este nivel
                niveles[nivel].forEach(materia => {
                    const registro = historialPorMateria.get(materia.id);

                    const notaMostrar = registro && registro.nota_final !== null
                        ? registro.nota_final
                        : '<span class="text-muted">-</span>';
                    const estadoMostrar = registro ? registro.estado : '<span class="text-muted">Pendiente</span>';
                    const periodoMostrar = registro && registro.periodo ? registro.periodo : '-';
                    const fechaMostrar = registro
                        ? new Date(registro.fecha_registro).toLocaleDateString()
                        : '';

                    // Manejo visual de códigos vacíos
                    const codigo = (materia.codigo && materia.codigo !== "-") ? materia.codigo : "";

                    tableBody.innerHTML += `
                        <tr>
                            <td>${codigo}</td>
                            <td class="text-start fw-bold">${materia.nombre}</td>
                            <td class="text-info fw-bold">${notaMostrar}</td>
                            <td>${materia.creditos}</td>
                            <td>${materia.tipo}</td>
                            <td>${estadoMostrar}</td>
                            <td>${periodoMostrar}</td>
                            <td class="small">${fechaMostrar}</td>
                        </tr>
                    `;
                });
            });
        });
    </script>
</body>
</html>
